<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLLIS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

h1{
    font-size:4rem;
    margin-bottom:15px;
    letter-spacing:3px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:50px;
    font-size:1.2rem;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;
    padding:35px;
    transition:all .3s ease;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:10px;
    font-size:1.8rem;
}

.card p{
    color:#cbd5e1;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    background:#d4af37;
    color:#111827;
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

footer{
    margin-top:40px;
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🍽️ FOLLIS</h1>

<p class="subtitle">
Seleziona la lingua / Select your language
</p>

<div class="cards">

<div class="card">
    <div class="icon">🇮🇹</div>
    <h2>Menu Italiano</h2>
    <p>Consulta il menu in lingua italiana.</p>
    <a class="btn" href="ITALIANO.pdf" target="_blank">
        Apri Menu
    </a>
</div>

<div class="card">
    <div class="icon">🇪🇳</div>
    <h2>English Menu</h2>
    <p>See the menu in English.</p>
    <a class="btn" href="INGLESE.pdf" target="_blank">
        Open Menu
    </a>
</div>

</div>

<footer>
© FOLLIS Restaurant
</footer>

</div>

</body>
</html>
