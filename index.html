<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLLIS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#ffffff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#111111;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

.logo{
    width:250px;
    max-width:80%;
    margin-bottom:20px;
}

.subtitle{
    color:#666;
    margin-bottom:50px;
    font-size:1.2rem;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:20px;
    padding:35px;
    transition:all .3s ease;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:10px;
    font-size:1.8rem;
    color:#111;
}

.card p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    background:#000000;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#222222;
    transform:scale(1.05);
}

footer{
    margin-top:40px;
    color:#999;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo-follis.png" alt="FOLLIS" class="logo">

<p class="subtitle">
Seleziona la lingua / Select your language
</p>

<div class="cards">

<div class="card">
    <div class="icon"></div>
    <h2>ITA</h2>
    <p>Consulta il menu in italiano.</p>
    <a class="btn" href="ITALIANO.pdf" target="_blank">
        Apri Menu
    </a>
</div>

<div class="card">
    <div class="icon"></div>
    <h2>ENG</h2>
    <p>View the menu in English.</p>
    <a class="btn" href="INGLESE.pdf" target="_blank">
        Open Menu
    </a>
</div>

</div>

<footer>
© FOLLIS - Panetteria Pasticceria Bar
</footer>

</div>

</body>
</html>
